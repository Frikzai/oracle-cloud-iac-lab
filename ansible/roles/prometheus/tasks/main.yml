---
- name: Ignorer prometheus en mode check
  ansible.builtin.debug:
    msg: "prometheus est ignoré en mode check"
  when: ansible_check_mode

- name: Créer le groupe prometheus
  ansible.builtin.group:
    name: "{{ prometheus_group }}"
    system: true
  become: true
  when: not ansible_check_mode

- name: Créer l'utilisateur prometheus
  ansible.builtin.user:
    name: "{{ prometheus_user }}"
    group: "{{ prometheus_group }}"
    shell: /usr/sbin/nologin
    system: true
    create_home: false
  become: true
  when: not ansible_check_mode

- name: Créer les dossiers prometheus
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ prometheus_user }}"
    group: "{{ prometheus_group }}"
    mode: "0755"
  loop:
    - "{{ prometheus_config_dir }}"
    - "{{ prometheus_data_dir }}"
  become: true
  when: not ansible_check_mode

- name: Télécharger prometheus
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"
    dest: "/tmp/prometheus-{{ prometheus_version }}.tar.gz"
    mode: "0644"
  become: true
  when: not ansible_check_mode

- name: Extraire prometheus
  ansible.builtin.unarchive:
    src: "/tmp/prometheus-{{ prometheus_version }}.tar.gz"
    dest: /tmp
    remote_src: true
  become: true
  when: not ansible_check_mode

- name: Installer le binaire prometheus
  ansible.builtin.copy:
    src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/prometheus"
    dest: /usr/local/bin/prometheus
    owner: root
    group: root
    mode: "0755"
    remote_src: true
  become: true
  when: not ansible_check_mode

- name: Installer le binaire promtool
  ansible.builtin.copy:
    src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/promtool"
    dest: /usr/local/bin/promtool
    owner: root
    group: root
    mode: "0755"
    remote_src: true
  become: true
  when: not ansible_check_mode

- name: Copier les consoles prometheus
  ansible.builtin.copy:
    src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/{{ item }}"
    dest: "{{ prometheus_config_dir }}/{{ item }}"
    owner: "{{ prometheus_user }}"
    group: "{{ prometheus_group }}"
    mode: "0755"
    remote_src: true
  loop:
    - consoles
    - console_libraries
  become: true
  when: not ansible_check_mode

- name: Déployer la configuration prometheus
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ prometheus_config_dir }}/prometheus.yml"
    owner: "{{ prometheus_user }}"
    group: "{{ prometheus_group }}"
    mode: "0644"
  become: true
  notify: Restart prometheus
  when: not ansible_check_mode

- name: Créer le service systemd prometheus
  ansible.builtin.copy:
    dest: /etc/systemd/system/prometheus.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Prometheus
      Wants=network-online.target
      After=network-online.target

      [Service]
      User={{ prometheus_user }}
      Group={{ prometheus_group }}
      Type=simple
      ExecStart=/usr/local/bin/prometheus \
        --config.file={{ prometheus_config_dir }}/prometheus.yml \
        --storage.tsdb.path={{ prometheus_data_dir }} \
        --web.listen-address={{ prometheus_listen_address }} \
        --web.console.templates={{ prometheus_config_dir }}/consoles \
        --web.console.libraries={{ prometheus_config_dir }}/console_libraries

      Restart=on-failure

      [Install]
      WantedBy=multi-user.target
  become: true
  when: not ansible_check_mode

- name: Recharger systemd
  ansible.builtin.systemd:
    daemon_reload: true
  become: true
  when: not ansible_check_mode

- name: Activer et démarrer prometheus
  ansible.builtin.service:
    name: prometheus
    state: started
    enabled: true
  become: true
  when: not ansible_check_mode
